---
apiVersion: "gateway.networking.k8s.io/v1"
kind: "HTTPRoute"
metadata:
  name: "localtest-gateway-vault-localtest-me-route"
spec:
  parentRefs:
    - name: "localtest-gateway"
  hostnames:
    - "vault.localtest.me"
  rules:
    - matches:
        - path:
            type: "PathPrefix"
            value: "/"
      backendRefs:
        - name: "vault-service"
          port: 8200
