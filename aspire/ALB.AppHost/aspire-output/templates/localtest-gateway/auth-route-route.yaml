---
apiVersion: "gateway.networking.k8s.io/v1"
kind: "HTTPRoute"
metadata:
  name: "localtest-gateway-auth-route-route"
spec:
  parentRefs:
    - name: "localtest-gateway"
  hostnames:
    - "auth-route"
  rules:
    - matches:
        - path:
            type: "PathPrefix"
            value: "/"
      backendRefs:
        - name: "zitadel-service"
          port: 8080
