---
apiVersion: "gateway.networking.k8s.io/v1"
kind: "Gateway"
metadata:
  name: "localtest-gateway"
  annotations:
    cert-manager.io/cluster-issuer: "local-ca"
spec:
  gatewayClassName: "traefik"
  listeners:
    - name: "http"
      protocol: "HTTP"
      port: 80
      allowedRoutes:
        namespaces:
          from: "Same"
    - name: "https"
      protocol: "HTTPS"
      port: 443
      hostname: "*.localtest.me"
      tls:
        mode: "Terminate"
        certificateRefs:
          - name: "localtest-gateway-tls"
      allowedRoutes:
        namespaces:
          from: "Same"
