---
apiVersion: "gateway.networking.k8s.io/v1"
kind: "HTTPRoute"
metadata:
  name: "localtest-gateway-api-localtest-me-route"
spec:
  parentRefs:
    - name: "localtest-gateway"
  hostnames:
    - "api.localtest.me"
  rules:
    - matches:
        - path:
            type: "PathPrefix"
            value: "/"
      backendRefs:
        - name: "api-service"
          port: 8080
