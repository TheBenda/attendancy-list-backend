---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "zitadel-login-deployment"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "zitadel-login"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "zitadel-login"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "ghcr.io/zitadel/zitadel-login:v4.15.0"
          name: "zitadel-login"
          envFrom:
            - configMapRef:
                name: "zitadel-login-config"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 3000
          volumeMounts:
            - name: "zitadel-bootstrap"
              mountPath: "/zitadel/bootstrap"
          imagePullPolicy: "IfNotPresent"
      volumes:
        - name: "zitadel-bootstrap"
          emptyDir: {}
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "zitadel-login"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
