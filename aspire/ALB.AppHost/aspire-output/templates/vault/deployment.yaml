---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "vault-deployment"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "vault"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "vault"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "{{ .Values.parameters.vault.vault_image }}"
          name: "vault"
          envFrom:
            - configMapRef:
                name: "vault-config"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 8200
          volumeMounts:
            - name: "vault-data"
              mountPath: "/vault/file"
          imagePullPolicy: "IfNotPresent"
      volumes:
        - name: "vault-data"
          emptyDir: {}
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "vault"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
