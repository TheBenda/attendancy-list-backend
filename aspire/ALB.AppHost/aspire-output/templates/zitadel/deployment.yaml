---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "zitadel-deployment"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "zitadel"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "zitadel"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "ghcr.io/zitadel/zitadel:v4.15.0"
          name: "zitadel"
          envFrom:
            - configMapRef:
                name: "zitadel-config"
            - secretRef:
                name: "zitadel-secrets"
          args:
            - "start-from-init"
            - "--masterkeyFromEnv"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 8080
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "zitadel"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
