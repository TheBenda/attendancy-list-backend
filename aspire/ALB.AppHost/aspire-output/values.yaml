parameters:
  api:
    api_image: "api:latest"
  vite_app:
    vite_app_image: "vite-app:latest"
  vault:
    vault_image: "vault:latest"
secrets:
  postgres:
    postgres_password: ""
  postgres_zitadel:
    postgres_zitadel_password: ""
  zitadel:
    zitadel_masterKey: ""
    postgres_zitadel_password: ""
    zitadel_password: ""
    ConnectionStrings__postgres_zitadel_db: ""
    POSTGRES_ZITADEL_DB_URI: ""
  api:
    ConnectionStrings__postgresdb: ""
    postgres_password: ""
    POSTGRESDB_URI: ""
    vault_token: ""
config:
  postgres:
    POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    POSTGRES_USER: "postgres"
  postgres_zitadel:
    POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    POSTGRES_USER: "postgres"
  zitadel:
    ZITADEL_TLS_ENABLED: "false"
    ZITADEL_EXTERNALSECURE: "true"
    ZITADEL_EXTERNALDOMAIN: "auth.localtest.me"
    ZITADEL_EXTERNALPORT: "443"
    ZITADEL_DATABASE_POSTGRES_HOST: "postgres-zitadel-service"
    ZITADEL_DATABASE_POSTGRES_PORT: "5432"
    ZITADEL_DATABASE_POSTGRES_DATABASE: "postgres-zitadel-db"
    ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: "postgres"
    ZITADEL_DATABASE_POSTGRES_USER_USERNAME: "postgres"
    ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: "admin"
    ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
    ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
    ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: "https://auth.localtest.me/ui/v2/login/"
    ZITADEL_OIDC_DEFAULTLOGINURLV2: "https://auth.localtest.me/ui/v2/login/login?authRequest="
    ZITADEL_OIDC_DEFAULTLOGOUTURLV2: "https://auth.localtest.me/ui/v2/login/logout?post_logout_redirect="
    ZITADEL_SAML_DEFAULTLOGINURLV2: "https://auth.localtest.me/ui/v2/login/login?samlRequest="
    ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: "/zitadel/bootstrap/login-client.pat"
    ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: "login-client"
    ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: "Automatically Initialized IAM_LOGIN_CLIENT"
    ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
    POSTGRES_ZITADEL_DB_HOST: "postgres-zitadel-service"
    POSTGRES_ZITADEL_DB_PORT: "5432"
    POSTGRES_ZITADEL_DB_USERNAME: "postgres"
    POSTGRES_ZITADEL_DB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-zitadel-service:5432/postgres-zitadel-db"
    POSTGRES_ZITADEL_DB_DATABASENAME: "postgres-zitadel-db"
  zitadel_login:
    ZITADEL_API_URL: "http://zitadel-service:8080"
    NEXT_PUBLIC_BASE_PATH: "/ui/v2/login"
    ZITADEL_SERVICE_USER_TOKEN_FILE: "/zitadel/bootstrap/login-client.pat"
    CUSTOM_REQUEST_HEADERS: "Host:auth.localtest.me,X-Forwarded-Proto:https"
  api:
    OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
    ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    HTTP_PORTS: "8080"
    POSTGRESDB_HOST: "postgres-service"
    POSTGRESDB_PORT: "5432"
    POSTGRESDB_USERNAME: "postgres"
    POSTGRESDB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-service:5432/postgresdb"
    POSTGRESDB_DATABASENAME: "postgresdb"
    VITE_APP_HTTP: "http://vite-app-service:5000"
    services__vite_app__http__0: "http://vite-app-service:5000"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://k8s-dashboard-service:18889"
    OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
    OTEL_SERVICE_NAME: "api"
  vite_app:
    NODE_ENV: "production"
    PORT: "5000"
    API_HTTP: "http://api-service:8080"
    services__api__http__0: "http://api-service:8080"
    API_HTTPS: "https://api-service:8080"
    YARP_ENABLE_STATIC_FILES: "true"
  vault:
    VAULT_ADDR: "http://127.0.0.1:8200"
