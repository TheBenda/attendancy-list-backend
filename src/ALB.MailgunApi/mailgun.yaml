        esp_block: failure events where the failure reason is espblock
        temporary_failed_esp_block: >-
          failure events where the failure reason is espblock and the severity
          is temporary
        permanent_failed_esp_block: >-
          failure events where the failure reason is espblock and the severity
          is permanent
        webhook_failure: failed webhook events
        permanent_failed_optimized: 'failed events where the severity is permanent and the '
        permanent_failed_old: failed events where the severity is permanent
        bounced: all permanent failed events other than suppresions or webhook failures
        hard_bounces: failed events where delivery-status.bounce-type is hard
        soft_bounces: failed events where delivery-status.bounce-type is soft
        delayed_bounce: permanent failed events where flags.is-delayed-bounce is true
        suppressed_bounces: permanent failed events where reason is suppress-bounce
        suppressed_unsubscribed: permanent failed events where reason is suppress-unsubscribe
        suppressed_complaints: permanent failed events where reason is suppress-complaint
        delivered_first_attempt: delivered events that succeeded on the first attempt
        delivered_subsequent: >-
          delivered events that failed on the first attempt but were eventually
          successful
        delivered_two_plus_attempts: delivered events that required two or more delivery attempts
        delayed_first_attempt: >-
          delivered events that failed the first attempt or failed events where
          reason is old
    github.com-mailgun-logs-api-pkg-api-model-FilterAttribute:
      type: string
      enum:
        - id
        - domain
        - ip
        - ip_pool
        - recipient_domain
        - recipient_provider
        - country
        - bot
        - device
        - subaccount
        - event
        - attachment_filename
        - from
        - message_id
        - subject
        - mailing_list_address
        - to
        - size
        - recipient
        - tag
        - severity
        - user_variables
        - delivered_at
        - delivery_status_code
        - delivery_status_bounce_type
        - delivery_status_message
        - is_routed
        - i_classification_rule_id
        - i_classification_group_id
        - recipients
      description: Filter Attribute
      x-enumDescriptions:
        id: >-
          Filter on a specific id of a log message. Mostly used to retrieve a
          specific log found in Kibana
        domain: Filter on a given sender domain used for delivery
        ip: Filter on the ip address used for delivery
        ip_pool: Filter on the name of the ip pool used for delivery
        recipient_domain: Filter on the domain of the email recipient
        recipient_provider: Filter on the email provider of the recipient
        country: >-
          For open and click events, filter on the country of the email
          recipient
        bot: >-
          For open and click events, filter on the client-info.bot field which
          tracks if an actual person triggered the event, or an email client
          program
        device: >-
          For open and click events, filter on the device the email recipient
          was using when openning or clicking on the email.
        subaccount: Filter to events generated for a subaccount
        event: >-
          Filter for a specific event by name. Since `metric_events` can be
          comprised of multiple events, this can be used to drill into a
          specific event.
        attachment_filename: >-
          Filter delivered events for those containing an attachment with a
          given filename
        from: Filter for events with a given from address
        message_id: >-
          Filter for events with a given message-id header. A message ID ties
          together the accepted, delivered, and any failed events over the
          lifecycle of the email
        subject: Filter for emails with a given subject
        mailing_list_address: Filter for emails with a given mailing list address
        to: >-
          Filter for emails with a given to field. This can contain a mailing
          list and can also contain the display name of the email recipient such
          as John Doe
        size: >-
          Filter emails based on size in bytes. This field must use < or > as
          the comparator
        recipient: Filter for emails with a given recipient, which is an email address
        tag: >-
          Filter for emails with a given tag (or tags if using the contains
          comparator)
        severity: >-
          Filter failure events based on their severity. Possible values are
          either temporary or permanent
        user_variables: >-
          Filter on user defined variables associated with the email. User
          variables are stored as a flat JSON string and filters search against
          keys or values
        delivered_at: >-
          Filter for deliveries that occured before or after a given time, given
          as RFC1123Z. Comparator must be < or >
        delivery_status_code: Filter for failure or delivery events with a specific delivery code
        delivery_status_bounce_type: Filter for a given bounce type. Either soft or hard
        delivery_status_message: >-
          Filter for a status message. Like `delivery_status_code` but checks
          against a status message string
        is_routed: Filter on the flags.is_routed boolean flag
        i_classification_rule_id: >-
          Filter on the i-classification.rule-id associated with a bounce
          classification rule
        i_classification_group_id: >-
          Filter on the i-classification.group-id associated with a bounce
          classification group
        recipients: >-
          Filter on the list of email message recipients. Must use the
          "contains" or "not contains" comparators
