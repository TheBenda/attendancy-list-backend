          description: Domain record information
        sending_dns_records:
          type: array
          items:
            anyOf:
              - $ref: >-
                  #/components/schemas/github.com-mailgun-domains-client-golang-Record
              - type: 'null'
          description: List of DNS records required for sending emails
        receiving_dns_records:
          type: array
          items:
            anyOf:
              - $ref: >-
                  #/components/schemas/github.com-mailgun-domains-client-golang-Record
